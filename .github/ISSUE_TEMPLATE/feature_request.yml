name: Feature Request
description: 建议新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出新功能建议！请先确认你的想法与项目方向一致。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你想实现什么功能？
      placeholder: 清晰地描述你希望添加的功能
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 使用场景
      description: 这个功能解决什么问题？
      placeholder: 你在什么场景下需要这个功能？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 目前有什么临时解决方案？
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 提交前确认
      options:
        - label: 我已经搜索过 existing Issues，确认不是重复建议
          required: true
        - label: 我确认这与项目的研究学习目标一致
          required: true
